[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers

# Üçüncü taraf (FastAPI/Starlette) kütüphanelerinden gelen,
# bizim kontrolümüz dışındaki Python 3.16 deprecation uyarılarını
# bastırıyoruz. requirements.txt'te sürümleri sabitli → bu uyarılar
# kütüphaneler güncellenince kaybolacak. Bizim kodumuzdan gelen
# DeprecationWarning'ler hâlâ görünür.
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
