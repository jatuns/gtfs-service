name: CI

# Ne zaman koşar:
# - main'e push
# - main'e açılan PR
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pytest + Newman (API contract)
    runs-on: ubuntu-latest

    # PostgreSQL servisi — GitHub Actions, Docker konteyneri olarak
    # otomatik açıp testler bitince kapatır. Health-check ile veritabanı
    # gerçekten hazır olunca testlere geçilir.
    services:
      postgres:
        # postgis/postgis: postgres:16 + PostGIS paketi.
        # Stop.geom (Geography) kolonu CREATE EXTENSION postgis gerektirir;
        # extension'ı models/gtfs.py'deki before_create DDL listener'ı kurar.
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: gtfs_user
          POSTGRES_PASSWORD: gtfs_pass
          POSTGRES_DB: gtfs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Python 3.14 henüz GitHub Actions'ta stable değil.
          # 3.12 ile koşmak yeterli — psycopg3 her iki sürümde çalışıyor.
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # 1) Tüm Python dosyaları derleniyor mu? (sentaks)
      - name: Syntax check
        run: python -m compileall -q app tests

      # 2) Uygulama import edilebiliyor mu? (import zinciri sağlam mı?)
      #    Burası bağımlılık kurulumu ve modül grafiği için en hızlı dumduz testi.
      - name: Import check
        env:
          DATABASE_URL: postgresql://gtfs_user:gtfs_pass@localhost:5432/gtfs_db
        run: python -c "from app.main import app; print('app loaded:', app.title)"

      # 3) Tüm test seti.
      #    tests/conftest.py'deki ensure_test_data() session-fixture'ı,
      #    aktif Burulas snapshot'ı yoksa tests/fixtures/mini_gtfs/'i
      #    otomatik import eder. CI'da DB boş olduğu için fixture devreye
      #    girer → 64 testin tamamı geçer. Veriler DB'de KALIR — sonraki
      #    Newman adımı bunları kullanacak.
      # ADMIN_API_KEYS ve RATE_LIMIT_PER_MINUTE conftest.py'de
      # setdefault ile atanır → workflow env'inde set etmiyoruz ki
      # test_security'deki TEST_ADMIN_API_KEY ile aynı değer kalsın.
      - name: Pytest (with auto-fixture)
        env:
          DATABASE_URL: postgresql://gtfs_user:gtfs_pass@localhost:5432/gtfs_db
        run: pytest

      # 4) Node.js (Newman için)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman

      # 5) Uvicorn'u arka planda başlat — Newman buna karşı istek atacak
      #    Pytest fixture'ı zaten mini_gtfs verisini DB'ye yükledi.
      - name: Start uvicorn
        env:
          DATABASE_URL: postgresql://gtfs_user:gtfs_pass@localhost:5432/gtfs_db
          ADMIN_API_KEYS: ci-admin-key
          RATE_LIMIT_PER_MINUTE: "0"
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            > uvicorn.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for /health
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "Uvicorn hazır (${i}. denemede)"
              exit 0
            fi
            sleep 1
          done
          echo "Uvicorn başlamadı — log:"
          cat uvicorn.log
          exit 1

      # 6) Newman ile Postman koleksiyonunu koştur
      #    32 assertion, ~1 saniye. Pytest'in yakalayamadığı API kontrat
      #    bozulmalarını yakalar (yanıt yapısı, header'lar, status code'lar).
      - name: Newman (Postman collection)
        run: |
          newman run docs/postman_collection.json \
            -e docs/postman_environment.json \
            --color off \
            --reporters cli,json \
            --reporter-json-export newman-report.json

      # 7) Newman raporunu artifact olarak kaydet (debugging için)
      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: newman-report.json
          retention-days: 7

      # 8) Uvicorn'u kapat (kaynak temizliği)
      - name: Stop uvicorn
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill $(cat uvicorn.pid) 2>/dev/null || true
          fi
